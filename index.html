<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUNERACER PRO</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* 🔥 VALORANT BACKGROUND */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,0,60,0.15), transparent 60%);
    animation: moveBg 15s linear infinite;
    z-index:-2;
}

@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-50%,-50%);}
}

/* PARTICLES */
#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #ff003c;
    position:sticky;
    top:0;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav h1{
    color:#ff003c;
    text-shadow:0 0 15px red;
}

.menu a{
    margin:10px;
    color:white;
    text-decoration:none;
}
.menu a:hover{
    color:#ff003c;
    text-shadow:0 0 10px red;
}

.hamburger{display:none;cursor:pointer;}

@media(max-width:768px){
.menu{
    display:none;
    flex-direction:column;
    background:black;
    position:absolute;
    top:60px;
    right:0;
    width:150px;
}
.menu.active{display:flex;}
.hamburger{display:block;}
}

/* SECTION */
section{
    padding:80px 20px;
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}
section:first-of-type{
    opacity:1;
    transform:none;
}
.show{
    opacity:1;
    transform:translateY(0);
}

/* HOME */
#home h2{
    font-size:32px;
    color:#ff003c;
    text-shadow:0 0 15px red;
}

/* BUTTON */
button{
    background:#ff003c;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
button:hover{
    box-shadow:0 0 20px red;
}

/* CARDS */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(8px);
    padding:15px;
    border-radius:15px;
    border:1px solid rgba(255,0,60,0.3);
    transition:0.3s;
}
.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px red;
}
.card img{width:100%;border-radius:10px;}

.card-container{
    display:grid;
    gap:20px;
}
@media(min-width:768px){
.card-container{grid-template-columns:repeat(3,1fr);}
}

/* GALLERY */
.gallery img{
    width:100%;
    border-radius:10px;
}
.gallery img:hover{
    box-shadow:0 0 20px red;
}

/* STATS */
.stats{
    display:flex;
    justify-content:center;
    gap:40px;
}
.stats h2{
    color:#ff003c;
}

/* FOOTER */
footer{
    border-top:1px solid red;
    text-align:center;
    padding:15px;
    color:gray;
}

/* 🔥 CURSOR GLOW */
.glow{
    position:absolute;
    width:8px;
    height:8px;
    background:#ff003c;
    border-radius:50%;
    pointer-events:none;
    box-shadow:0 0 10px red, 0 0 20px red;
    animation: fadeOut 0.5s linear;
}

@keyframes fadeOut{
    from{opacity:1;}
    to{opacity:0;}
}

iframe{border-radius:10px;}

</style>
</head>

<body>

<div id="particles-js"></div>

<nav>
<h1>TUNERACER</h1>
<div class="hamburger">☰</div>

<div class="menu">
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#streams">Live</a>
<a href="#videos">Videos</a>
<a href="#gallery">Gallery</a>
<a href="#stats">Stats</a>
</div>
</nav>

<section id="home">
<h2 id="typing"></h2>
<p>High Speed Gaming | Valorant | Racing</p>
<button onclick="scrollToLive()">Watch Live</button>
</section>

<section id="about">
<h3 style="color:red;">About</h3>
<p>TUNERACER is a gaming brand focused on competitive gameplay.</p>
</section>

<section id="streams">
<h3 style="color:red;">Live Stream</h3>
<p id="liveStatus"></p>

<iframe width="100%" height="250"
src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID"></iframe>
</section>

<section id="videos">
<h3 style="color:red;">Videos</h3>
<div class="card-container">
<div class="card" onclick="openVideo('https://youtube.com')">
<img src="https://via.placeholder.com/300"><p>Video 1</p>
</div>
<div class="card" onclick="openVideo('https://youtube.com')">
<img src="https://via.placeholder.com/300"><p>Video 2</p>
</div>
<div class="card" onclick="openVideo('https://youtube.com')">
<img src="https://via.placeholder.com/300"><p>Video 3</p>
</div>
</div>
</section>

<section id="gallery">
<h3 style="color:red;">Gallery</h3>
<div class="card-container gallery">
<img src="https://via.placeholder.com/300" onclick="emoji(event)">
<img src="https://via.placeholder.com/300" onclick="emoji(event)">
<img src="https://via.placeholder.com/300" onclick="emoji(event)">
</div>
</section>

<section id="stats">
<h3 style="color:red;">Stats</h3>
<div class="stats">
<div><h2 id="video">0</h2><p>Videos</p></div>
<div><h2 id="subs">0</h2><p>Subscribers</p></div>
</div>
</section>

<footer>© 2026 TUNERACER</footer>

<script>

// 🔥 PARTICLES
particlesJS("particles-js", {
  particles:{
    number:{value:80},
    size:{value:3, random:true},
    move:{speed:2},
    line_linked:{enable:true, color:"#ff003c"}
  }
});

// MENU
document.querySelector(".hamburger").onclick=()=>{
document.querySelector(".menu").classList.toggle("active");
};

// SCROLL
document.querySelectorAll("a").forEach(a=>{
a.onclick=(e)=>{
e.preventDefault();
document.querySelector(a.getAttribute("href")).scrollIntoView({behavior:"smooth"});
};
});

// LIVE
document.getElementById("liveStatus").innerText =
Math.random()>0.5 ? "🔴 LIVE NOW" : "⚫ OFFLINE";

// VIDEO
function openVideo(url){window.open(url,"_blank");}

// EMOJI
function emoji(e){
let el=document.createElement("div");
el.innerHTML="🔥";
el.style.position="absolute";
el.style.left=e.pageX+"px";
el.style.top=e.pageY+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),800);
}

// COUNTER
function counter(id,max){
let i=0;
let x=setInterval(()=>{
i+=5;
document.getElementById(id).innerText=i;
if(i>=max) clearInterval(x);
},40);
}
counter("video",697);
counter("subs",369);

// SCROLL ANIMATION
window.addEventListener("scroll",()=>{
document.querySelectorAll("section").forEach(sec=>{
if(sec.getBoundingClientRect().top < window.innerHeight-50){
sec.classList.add("show");
}
});
});

// TYPING
let text="WELCOME TO TUNERACER";
let i=0;
(function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i++);
setTimeout(typing,70);
}
})();

// BUTTON
function scrollToLive(){
document.querySelector("#streams").scrollIntoView({behavior:"smooth"});
}

// 🔥 CURSOR GLOW TRAIL
document.addEventListener("mousemove",(e)=>{
let glow=document.createElement("div");
glow.className="glow";
glow.style.left=e.pageX+"px";
glow.style.top=e.pageY+"px";
document.body.appendChild(glow);
setTimeout(()=>glow.remove(),500);
});

</script>

</body>
</html>
